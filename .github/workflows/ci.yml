name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  install-and-typecheck:
    name: Install & Type-check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify CLI binaries are hoisted
        run: |
          echo "Checking hoisted binaries..."
          test -f node_modules/.bin/tsx      && echo "✓ tsx"      || echo "✗ tsx MISSING"
          test -f node_modules/.bin/vite     && echo "✓ vite"     || echo "✗ vite MISSING"
          test -f node_modules/.bin/tsc      && echo "✓ tsc"      || echo "✗ tsc MISSING"
          test -f node_modules/.bin/drizzle-kit && echo "✓ drizzle-kit" || echo "✗ drizzle-kit MISSING"

      - name: Type-check
        run: pnpm typecheck
        env:
          NODE_ENV: development
