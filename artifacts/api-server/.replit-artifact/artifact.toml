kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 5000
name = "API Server"
paths = ["/api", "/"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]
build = ["pnpm", "--filter", "@workspace/api-server", "run", "build"]
run = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.buildEnv]
NODE_ENV = "production"
CI = "true"

[services.production.env]
PORT = "5000"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/health"

[services.env]
PORT = "5000"
